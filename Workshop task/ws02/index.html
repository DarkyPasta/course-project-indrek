<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workshop 2 – CSS Fundamentals</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Internal CSS -->
    <style>
        h1 {
            color: green;
            font-size: 2em;
        }

        body {
            background-color: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        p {
            color: blue;
        }

        .content-box {
            padding: 20px;
            margin: 15px 0;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #e6e6e6;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        label {
            font-weight: bold;
        }

        input[type="text"],
        input[type="email"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049;
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Inline CSS -->
    <h1 style="border-bottom: 2px solid black;">Indrek – Styled HTML Page</h1>

    <p>Hello! This is my Workshop 2 page where I practice CSS fundamentals.</p>

    <img src="../images/crossout.png" alt="A picture representing me" width="250">

    <div class="content-box">
<h3>Sample Heading</h3>
        <p>This is a sample paragraph inside a styled div element.</p>
    </div>

    <h2>My Courses</h2>
    <table>
        <tr>
            <th>Course</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Web Development</td>
            <td>Ongoing</td>
        </tr>
        <tr>
            <td>IT Service Management</td>
            <td>Completed</td>
        </tr>
        <tr>
            <td>Business IT</td>
            <td>Ongoing</td>
        </tr>
    </table>

    <h2>Contact Form</h2>
    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name">

        <label for="email">Email:</label>
        <input type="email" id="email" name="email">

        <input type="submit" value="Submit">
    </form>

</body>
</html>
