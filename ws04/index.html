<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workshop 4 – Page Layout Techniques</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Internal CSS (WS04 layout styles) -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fafafa;
            margin: 0;
            padding: 0;
        }

        /* Task 1: Semantic layout */
        header {
            background-color: #4CAF50;
            padding: 20px;
            color: white;
        }

        header nav ul {
            list-style: none;
            padding: 0;
            display: flex;
            gap: 15px;
        }

        header nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        main {
            padding: 20px;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 15px;
            text-align: center;
            margin-top: 20px;
        }

        /* Task 2: Grid layout */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-gap: 10px;
            margin-top: 20px;
        }

        .grid-item {
            background-color: lightgreen;
            padding: 20px;
            text-align: center;
            border-radius: 4px;
        }

        /* Task 3: Flexbox layout */
        .flex-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 20px;
        }

        .box {
            background-color: lightblue;
            padding: 20px;
            text-align: center;
            border-radius: 4px;
            width: 100px;
        }

        /* Task 4: Media queries */
        .responsive-box {
            padding: 20px;
            text-align: center;
            margin-top: 20px;
            border-radius: 4px;
        }

        @media (max-width: 600px) {
            .responsive-box {
                background-color: lightcoral;
            }
        }

        @media (min-width: 601px) {
            .responsive-box {
                background-color: lightseagreen;
            }
        }
    </style>

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Task 1: Semantic layout -->
    <header>
        <h1>My Website</h1>
        <nav>
            <ul>
                <li><a href="#about">About</a></li>
                <li><a href="#grid">Grid</a></li>
                <li><a href="#flex">Flexbox</a></li>
                <li><a href="#responsive">Responsive</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section id="about">
            <h2>About Me</h2>
            <p>This is a paragraph about me. This section is part of the semantic layout.</p>
        </section>

        <!-- Task 2: Grid layout -->
        <section id="grid">
            <h2>Grid Layout</h2>
            <div class="grid-container">
                <div class="grid-item">1</div>
                <div class="grid-item">2</div>
                <div class="grid-item">3</div>
                <div class="grid-item">4</div>
                <div class="grid-item">5</div>
                <div class="grid-item">6</div>
            </div>
        </section>

        <!-- Task 3: Flexbox layout -->
        <section id="flex">
            <h2>Flexbox Layout</h2>
            <div class="flex-container">
                <div class="box">Box 1</div>
                <div class="box">Box 2</div>
                <div class="box">Box 3</div>
            </div>
        </section>

        <!-- Task 4: Media queries -->
        <section id="responsive">
            <h2>Responsive Box</h2>
            <div class="responsive-box">
                Resize the window to see the effect
            </div>
        </section>

    </main>

    <footer>
        <p>Copyright 2025</p>
    </footer>

</body>
</html>
